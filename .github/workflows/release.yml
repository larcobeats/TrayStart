name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Get version from tag
        id: version
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".TrimStart('v')
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Publish
        # Framework-dependent: ~3 MB instead of ~75 MB. Setup bootstraps the
        # .NET Desktop Runtime via --framework only on machines that lack it.
        run: dotnet publish src/TrayStart/TrayStart.csproj -c Release -r win-x64 --no-self-contained -o publish -p:Version=${{ steps.version.outputs.version }}

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Download previous releases (enables delta updates)
        continue-on-error: true
        run: vpk download github --repoUrl https://github.com/${{ github.repository }}

      - name: Pack
        run: >
          vpk pack
          --packId TrayStart
          --packVersion ${{ steps.version.outputs.version }}
          --packDir publish
          --mainExe TrayStart.exe
          --packTitle TrayStart
          --packAuthors larcobeats
          --icon src/TrayStart/Assets/TrayStart.ico
          --framework net8.0-x64-desktop

      - name: Upload to GitHub Release
        run: >
          vpk upload github
          --repoUrl https://github.com/${{ github.repository }}
          --publish
          --releaseName "TrayStart ${{ steps.version.outputs.version }}"
          --tag ${{ github.ref_name }}
          --token ${{ secrets.GITHUB_TOKEN }}
